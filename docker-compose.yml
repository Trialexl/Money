services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-money}
      POSTGRES_USER: ${DB_USER:-money}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-money} -d ${DB_NAME:-money}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: trialexl/money-backend@sha256:cdd507016108a2a2fb0a3e8d24665edc362946c01c8f65fcb7ec5cc7404f2e3b
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - django_static:/app/staticfiles

  frontend:
    image: trialexl/money-frontend@sha256:be6e3f61998d9d5eff584be27c588642773f462a2cbf8c6f128d7da2b9ff1632
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - django_static:/srv/django-static:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  django_static:
  caddy_data:
  caddy_config:
