services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-money}
      POSTGRES_USER: ${DB_USER:-money}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-money} -d ${DB_NAME:-money}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: trialexl/money-backend@sha256:529269de917ec4863a01d102c34cfbab1987428a814d4bfa86ff01b82301c8da
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - django_static:/app/staticfiles

  frontend:
    image: trialexl/money-frontend@sha256:3b18a4562a1b8ff51cf02772d08410a88a8e7d41b592dd190d9e4ae4e68a25ae
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - django_static:/srv/django-static:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  django_static:
  caddy_data:
  caddy_config:
